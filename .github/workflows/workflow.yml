name: Build and Push to Docker on Release
on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_DOMAIN }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build And Push
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: ./LolEsportsCalendar/Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.REGISTRY_DOMAIN }}/lolesportscalendar:latest
            ${{ secrets.REGISTRY_DOMAIN }}/lolesportscalendar:${{ github.event.release.tag_name }}
